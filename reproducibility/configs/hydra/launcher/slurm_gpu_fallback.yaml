# Fallback GPU SLURM configuration.
# Targets hpcl8 when primary GPU nodes are busy.
#
# Usage:
#   python XX/compute.py --multirun hydra/launcher=slurm_gpu_fallback

defaults:
  - submitit_slurm

partition: p.hpcl8
timeout_min: 120
nodes: 1
tasks_per_node: 1
cpus_per_task: 8
gpus_per_node: 1
mem_gb: 32
array_parallelism: 1024
