# CPU-only SLURM configuration for smaller jobs.
# Targets hpcl8 to maximize throughput for lightweight runs.
#
# Usage:
#   python XX/compute.py --multirun hydra/launcher=slurm_cpu_small

defaults:
  - submitit_slurm

partition: p.hpcl93,p.hpcl8
timeout_min: 360
nodes: 1
tasks_per_node: 1
cpus_per_task: 8
gpus_per_node: 0
mem_gb: 32
array_parallelism: 1024
setup:
  - export TABPFN_ALLOW_CPU_LARGE_DATASET=1
