# CPU-only SLURM configuration targeting p.hpcl94c.
# Useful for VUN computation and other CPU-heavy isomorphism jobs.
#
# Usage:
#   python XX/compute.py --multirun hydra/launcher=slurm_cpu_hpcl94c

defaults:
  - submitit_slurm

partition: p.hpcl94c
timeout_min: 1440
nodes: 1
tasks_per_node: 1
cpus_per_task: 10
gpus_per_node: 0
mem_gb: 192
array_parallelism: 1024
setup:
  - export TABPFN_ALLOW_CPU_LARGE_DATASET=1
