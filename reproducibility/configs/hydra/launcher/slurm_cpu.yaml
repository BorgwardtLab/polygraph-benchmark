# CPU-only SLURM configuration.
#
# Override partition for your cluster:
#   python XX/compute.py --multirun hydra/launcher=slurm_cpu \
#     hydra.launcher.partition=YOUR_PARTITION

defaults:
  - submitit_slurm

partition: TODO_SET_YOUR_CPU_PARTITION
timeout_min: 1440
nodes: 1
tasks_per_node: 1
cpus_per_task: 10
gpus_per_node: 0
mem_gb: 192
array_parallelism: 1024
setup:
  - export TABPFN_ALLOW_CPU_LARGE_DATASET=1
