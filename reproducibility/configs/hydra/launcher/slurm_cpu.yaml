# CPU-only SLURM configuration.
# Uses a combined partition so jobs can land on hpcl94c or hpcl8.
#
# Usage:
#   python XX/compute.py --multirun hydra/launcher=slurm_cpu

defaults:
  - submitit_slurm

partition: p.hpcl93,p.hpcl94c,p.hpcl8
timeout_min: 1440
nodes: 1
tasks_per_node: 1
cpus_per_task: 10
gpus_per_node: 0
mem_gb: 192
array_parallelism: 1024
setup:
  - export TABPFN_ALLOW_CPU_LARGE_DATASET=1
